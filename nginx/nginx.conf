worker_processes auto;

worker_rlimit_nofile 65535;

events {
    # Максимальное количество соединений на worker процесс
    worker_connections 10240;
    
    # Использование эффективного метода обработки соединений
    use epoll;
    
    multi_accept on;
}

http {
    include       mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    keepalive_timeout  65;

    resolver 127.0.0.11 valid=30s;
    resolver_timeout 5s;

    # GZIP
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/javascript application/javascript application/json application/xml image/svg+xml;

    # Подмена Server
    server_tokens off;
    add_header Server "LibraryApp v2.0" always;

    # Логи
    log_format upstream_log '$remote_addr -> $upstream_addr [$request_method $request_uri]';
    access_log /var/log/nginx/access.log upstream_log;

    # Upstream с Health Checks
    upstream api_read {
        server library_api_master:8080 weight=2 max_fails=3 fail_timeout=30s;
        server library_api_slave1:8081 weight=1 max_fails=3 fail_timeout=30s;
        server library_api_slave2:8082 weight=1 max_fails=3 fail_timeout=30s;
    }
    upstream api_write {
        server library_api_master:8080 max_fails=3 fail_timeout=30s;
    }
    upstream api_mirror {
        server library_api_mirror:8080 max_fails=3 fail_timeout=30s;
    }
    upstream adminer_up {
        server library_adminer:8080 max_fails=3 fail_timeout=30s;
    }

    # Редирект HTTP на HTTPS
    server {
        listen 80;
        server_name localhost;
        return 301 https://$server_name$request_uri;
    }

    # HTTPS сервер с HTTP/2
    server {
        listen 443 ssl;
        http2 on;
        server_name localhost;

        # SSL сертификаты
        ssl_certificate /etc/nginx/ssl/nginx-selfsigned.crt;
        ssl_certificate_key /etc/nginx/ssl/nginx-selfsigned.key;

        # SSL настройки безопасности
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers on;

        # Корень - статика (основное приложение)
        root /var/www/project/static;

        location / {
            index index.html;
            try_files $uri $uri/ /index.html;
        }

        # /reserved - редирект на корень
        location /reserved {
            return 301 /;
        }

        # /legacy - редирект на API
        location /legacy {
            return 301 /api/v1;
        }

        # /documentation - README.html
        location /documentation {
            try_files $uri $uri/ /README.html;
        }

        # /managment - managment.html
        location /managment {
            try_files $uri /managment.html =404;
        }

        # /status - status.html
        location /status {
            try_files $uri /status.html =404;
        }

        # Статические файлы
        location /static/ {
            alias /var/www/project/static/;
            expires 1y;
            add_header Cache-Control "public, immutable";
        }

        location = /api/v1 {
            proxy_pass http://api_read/api/v1;
            proxy_next_upstream error timeout invalid_header http_500 http_502 http_503 http_504;
            proxy_connect_timeout 5s;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
        }

        location = /api/v2 {
            proxy_pass http://api_read/api/v2;
            proxy_next_upstream error timeout invalid_header http_500 http_502 http_503 http_504;
            proxy_connect_timeout 5s;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
        }

        # API
        location ~ ^/api/(v1|v2)/ {
            # Health check
            proxy_next_upstream error timeout invalid_header http_500 http_502 http_503 http_504;
            proxy_next_upstream_tries 3;
            proxy_connect_timeout 5s;
            proxy_send_timeout 10s;
            proxy_read_timeout 10s;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;

            limit_except GET HEAD OPTIONS {
                proxy_pass http://api_write;
            }

            proxy_pass http://api_read;
        }

        # /mirror
        location /mirror/ {
            location /mirror/api/ {
                proxy_pass http://api_mirror/api/;
                proxy_next_upstream error timeout invalid_header http_500 http_502 http_503 http_504;
                proxy_connect_timeout 5s;
                proxy_set_header Host $host;
                proxy_set_header X-Real-IP $remote_addr;
                proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                proxy_set_header X-Forwarded-Proto https;
                proxy_set_header X-Forwarded-Prefix /mirror;
            }

            location /mirror/static/ {
                alias /var/www/project/mirror-static/;
                expires 1y;
                add_header Cache-Control "public, immutable";
                try_files $uri $uri/ =404;
            }

            location /mirror/ {
                proxy_pass http://api_mirror/;
                proxy_next_upstream error timeout invalid_header http_500 http_502 http_503 http_504;
                proxy_connect_timeout 5s;
                proxy_set_header Host $host;
                proxy_set_header X-Real-IP $remote_addr;
                proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                proxy_set_header X-Forwarded-Proto https;
                proxy_set_header X-Forwarded-Prefix /mirror;

                sub_filter_once off;
                sub_filter 'href="/' 'href="/mirror/';
                sub_filter 'src="/' 'src="/mirror/';
                sub_filter 'action="/' 'action="/mirror/';
                sub_filter 'url(/' 'url(/mirror/';
                sub_filter '"/api/' '"/mirror/api/';
                sub_filter 'window.location.href = "/' 'window.location.href = "/mirror/';
                sub_filter_types text/html application/javascript text/css application/json;
            }
        }

        # /admin - админка БД
        location /admin {
            proxy_pass http://adminer_up/;
            proxy_next_upstream error timeout invalid_header http_500 http_502 http_503 http_504;
            proxy_connect_timeout 5s;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
        }

        # /monitoring - Grafana
        location /monitoring/ {
            proxy_pass http://library_grafana:3000/;
            proxy_connect_timeout 5s;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
            proxy_redirect / /monitoring/;
        }

        # Nginx status
        location /nginx_status {
            stub_status;
            allow all;
            access_log off;
        }

        # Health check endpoint для мониторинга upstream серверов
        location /health {
            access_log off;
            default_type text/plain;
            return 200 "healthy\n";
            add_header Content-Type text/plain;
        }
    }
}